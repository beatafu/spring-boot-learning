# ===========================================
# 生产环境配置
# ===========================================
spring:
  config:
    activate:
      on-profile: prod
  # 数据库配置
  datasource:
    url: jdbc:mysql://prod-db-cluster:3306/prod_db?useSSL=true
    username: ${DB_USERNAME}  # 从环境变量读取
    password: ${DB_PASSWORD}  # 从环境变量读取

# 服务器配置
server:
  port: 8080



# 日志配置
logging:
  level:
    root: WARN
    com.example: INFO
  file:
    name: /var/logs/app.log
    max-size: 100MB
    max-history: 90

# 自定义配置
app:
  name: 我的应用
  debug: false
  cache:
    enabled: true
    ttl: 3600

# 第三方服务（生产环境）
external:
  api:
    url: https://api.example.com
    timeout: 30000
    api-key: ${API_KEY}  # 从环境变量读取